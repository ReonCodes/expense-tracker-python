<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Expense Tracker</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="app">
      <h1>Expense Tracker</h1>

      <div class="stats">
        <div class="stat-card">
          <p class="label">Total Spent</p>
          <p class="value" id="total">UGX 0</p>
        </div>
      </div>

      <form id="expense-form">
        <input type="number" id="amount" placeholder="Amount (UGX)" required />
        <input type="text" id="description" placeholder="Description" />
        <input type="date" id="date" required />
        <select id="category" required>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Health">Health</option>
          <option value="Other">Other</option>
        </select>
        <button type="submit">Add Expense</button>
      </form>

      <div class="filters">
        <button class="filter-btn active" data-category="All">All</button>
        <button class="filter-btn" data-category="Food">Food</button>
        <button class="filter-btn" data-category="Transport">Transport</button>
        <button class="filter-btn" data-category="Entertainment">
          Entertainment
        </button>
        <button class="filter-btn" data-category="Health">Health</button>
        <button class="filter-btn" data-category="Other">Other</button>
      </div>

      <table id="expense-table">
        <thead>
          <tr>
            <th>Description</th>
            <th>Category</th>
            <th>Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="expense-list"></tbody>
      </table>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
